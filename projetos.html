<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Projetos de Luís Pereira, Designer Multimédia.">
  <title>Luís Pereira | Projects</title>
  <style>
    /* =========================================
       ESTILOS BASE
       ========================================= */
    :root {
      --black: #050505;
      --white: #f9f9f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--white);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: var(--black);
      overflow: hidden; /* Remove o scroll do body, vamos usar uma área específica */
    }

    .marcador {
      background-color: var(--white);
      display: inline;
      box-shadow: 0.25em 0 0 var(--white), -0.25em 0 0 var(--white);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }

    /* =========================================
       NAVEGAÇÃO (Agora FIXA no topo)
       ========================================= */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 6vw;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      /* Ligeiro gradiente para a nav ser legível quando as fotos passam por trás */
      background: linear-gradient(to bottom, rgba(249, 249, 249, 0.95) 0%, rgba(249, 249, 249, 0) 100%);
    }

    .logo {
      font-size: clamp(1.3rem, 2.7vw, 1.8rem);
      font-weight: 800;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--black);
      letter-spacing: -2px;
    }

    .nav-links { display: flex; gap: clamp(1.3rem, 2.7vw, 2.7rem); flex-wrap: wrap; }

    .nav-links a {
      text-decoration: none;
      color: var(--black);
      font-weight: 800;
      text-transform: lowercase;
      font-size: clamp(0.9rem, 1.35vw, 1.08rem);
      letter-spacing: -1px;
      transition: color 0.3s ease, transform 0.3s ease;
      display: inline-block;
      padding: 5px 0;
    }

    .nav-links a:focus-visible .marcador { background-color: var(--black); color: var(--white); box-shadow: 0.25em 0 0 var(--black), -0.25em 0 0 var(--black); }

    /* ESTADO ATIVO: Pinta o marcador de preto */

    .nav-links a.active .marcador {
      background-color: var(--black);
      color: var(--white);
      box-shadow: 0.25em 0 0 var(--black), -0.25em 0 0 var(--black);
    }

    /* =========================================
       GRELHA & SCROLL INFINITO (Página Principal)
       ========================================= */
    .main-scroll-area {
      height: 100vh;
      width: 100vw;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 120px 6vw 5vh 6vw; /* 120px em cima para compensar a nav fixa */
      /* Esconde a barra de scroll */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .main-scroll-area::-webkit-scrollbar { display: none; }

    .projetos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2vw;
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
    }

    .projeto-item {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      background-color: transparent;
    }

    .projeto-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(120%);
      mix-blend-mode: multiply;
      transition: filter 0.4s ease, mix-blend-mode 0.4s ease, transform 0.6s cubic-bezier(0.2, 1, 0.3, 1);
    }

    .projeto-item:hover .projeto-thumb {
      filter: grayscale(0%) contrast(100%);
      mix-blend-mode: normal;
      transform: scale(1.03);
    }



    /* =========================================
       ESTILOS DO POP-UP (MODAL)
       ========================================= */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--white);
      z-index: 2000;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .modal.active { opacity: 1; pointer-events: auto; }

    .close-modal {
      position: absolute;
      top: 4vh;
      right: 6vw;
      background: none;
      border: none;
      font-family: inherit;
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      font-weight: 800;
      cursor: pointer;
      z-index: 2010;
      text-transform: lowercase;
    }

    .close-modal:hover .marcador { background-color: var(--black); color: var(--white); }

    .modal-left {
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding: 6vw;
      z-index: 2005;
      pointer-events: none;
    }

    .modal-left h3 {
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1.2;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .modal-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 6vw;
      text-align: right;
      z-index: 2005;
    }

    .modal-right p {
      font-size: clamp(1.1rem, 1.5vw, 1.5rem);
      max-width: 300px;
      line-height: 1.6;
      font-weight: bold;
    }

    .modal-right p a {
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 4px; /* Afasta um bocadinho a linha da palavra */
      transition: opacity 0.3s ease;
    }

    .modal.active .modal-right p {
      pointer-events: auto;
    }

    .modal-right p a:hover {
      opacity: 0.5; /* Fica ligeiramente transparente ao passar o rato */
    }

    .modal-center {
      flex: 1.5;
      height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15vh 0;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .modal-center::-webkit-scrollbar { display: none; }

    /* Imagens mantêm o comportamento normal */
    .scrollable-images img {
      width: 100%;
      height: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      display: block;
    }

    /* Vídeos com altura máxima para não saírem do ecrã e ficarem centrados */
    .scrollable-images video {
      width: 100%;
      max-height: 75vh; /* Ocupa no máximo 75% da altura da tela */
      object-fit: contain; /* Garante que o vídeo não é cortado e fica centrado na sua área */
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      display: block;
      margin: 0 auto; /* Ajuda a centrar horizontalmente */
      background-color: var(--white); /* Evita margens pretas em vídeos de proporções diferentes */
    }
    .scrollable-images img { width: 100%; height: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      nav { flex-direction: column; align-items: flex-start; gap: 15px; padding: 20px 6vw; background: rgba(249, 249, 249, 0.98); }
      .main-scroll-area { padding-top: 150px; }
      .projetos-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { flex-direction: column; display: block; overflow-y: auto; }
      .modal-left, .modal-right { position: relative; padding: 20px; text-align: left; justify-content: flex-start; }
      .modal-center { padding: 20px; height: auto; overflow: visible; }
      .close-modal { top: 20px; right: 20px; }
    }
    @media (max-width: 500px) {
      .projetos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<canvas id="halftone-canvas" aria-hidden="true" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></canvas>

<nav>
  <a href="index.html" class="logo" aria-label="Voltar à página inicial"><span class="marcador">lp.</span></a>
  <div class="nav-links">
    <a href="index.html"><span class="marcador">about</span></a>
    <a href="projetos.html" class="active"><span class="marcador">projects</span></a>
    <a href="cv.html"><span class="marcador">cv</span></a>
  </div>
</nav>

<div class="main-scroll-area" id="main-scroll-area">
  <div class="projetos-grid" id="main-grid">

    <div class="projeto-item" data-title="flyer neutura" data-desc="Flyer used at Sagal 26 used to promote Neutura products." data-imgs="desdobravel%203.png,desdobravel%201.png,desdobravel%202.png,desdobravel%204.png" onclick="abrirProjeto(this)">
      <img src="desdobravel%203.png" alt="Projeto 1" class="projeto-thumb">
    </div>
    <div class="projeto-item" data-title="neutura truck" data-desc="Neutura truck decoration." data-imgs="carrinha1.png,carrinha2.png,carrinha3.png,carrinha4.png,carrinha.gif" onclick="abrirProjeto(this)">
      <img src="carrinha.gif" alt="Projeto 3" class="projeto-thumb">
    </div>
    <div class="projeto-item" data-title="packaging neutura" data-desc="Packaging done for the new Neutura products.<br><br>Skewers, Mash, Rolls." data-imgs="espetadafba.png,espetadafpc.png,espetadapbp.png,migascb.png,migasrcb.png,rolos.png" onclick="abrirProjeto(this)">
      <img src="espetadas.jpg" alt="Projeto 4" class="projeto-thumb">
    </div>
    <div class="projeto-item" data-title="data visualization minorities in design" data-desc="The website comprises a visualization of the Design Census 2019 dataset using an implementation of a Sankey Diagram, aiming to explore the success of Minorities in the design industry. <br><br> <a href='https://student.dei.uc.pt/~pchurro/minorities_in_design/' target='_blank'>View website.</a>" data-imgs="dataviz.png" onclick="abrirProjeto(this)">
      <img src="dataviz.png" alt="Projeto 5" class="projeto-thumb">
    </div>
    <div class="projeto-item" data-title="audiovisual project existências" data-desc="A group project where the goal was to make a publicity and promotional film. <br><br> Existências is a non-profit social solidarity association, based in Coimbra, whose main objectives are social intervention and the promotion and protection of health, namely through the development of social integration and the provision of preventive, curative and rehabilitative care." data-imgs="existencias.mp4" onclick="abrirProjeto(this)">
      <img src="existenciasthumb.gif" alt="Projeto 6" class="projeto-thumb">
    </div>
    <div class="projeto-item" data-title="a day in dei" data-desc="We were tasked with creating a video highlighting the Department of Informatics Engineering (DEI) with the intent of it being apart of a social media campaign to promote it.<br><br>The concept for the video was inspired by a TikTok trend which consisted of taking the head of a person and overlaying it on top of different videos depicting different scenarios." data-imgs="dayindei.mp4" onclick="abrirProjeto(this)">
      <img src="dayindei.png" alt="Projeto 7" class="projeto-thumb">
    </div>
  </div>
</div>

<div id="projeto-modal" class="modal">
  <button class="close-modal" onclick="fecharProjeto()" aria-label="Close project">
    <span class="marcador">close [x]</span>
  </button>
  <div class="modal-left">
    <h3 id="modal-title"><span>nome do projeto</span></h3>
  </div>
  <div class="modal-center" id="modal-scroll-area">
    <div class="scrollable-images" id="modal-images"></div>
  </div>
  <div class="modal-right">
    <p id="modal-desc"><span>detalhes do projeto aqui.</span></p>
  </div>
</div>

<script>
  // ==========================================
  // FUNDO INTERATIVO (Halftone)
  // ==========================================
  const bgCanvas = document.getElementById('halftone-canvas');
  const bgCtx = bgCanvas.getContext('2d', { alpha: false });
  let bgWidth, bgHeight;
  let bgMouse = {x: -1000, y: -1000};

  function resizeBgCanvas() {
    bgWidth = window.innerWidth;
    bgHeight = window.innerHeight;
    bgCanvas.width = bgWidth;
    bgCanvas.height = bgHeight;
  }
  window.addEventListener('resize', resizeBgCanvas, { passive: true });
  resizeBgCanvas();
  window.addEventListener('mousemove', (e) => { bgMouse.x = e.clientX; bgMouse.y = e.clientY; }, { passive: true });
  window.addEventListener('touchmove', (e) => { bgMouse.x = e.touches[0].clientX; bgMouse.y = e.touches[0].clientY; }, { passive: true });

  function animateBg() {
    bgCtx.fillStyle = '#f9f9f9';
    bgCtx.fillRect(0, 0, bgWidth, bgHeight);
    const spacing = 16;
    const effectRadius = 150;

    for (let x = 0; x <= bgWidth; x += spacing) {
      for (let y = 0; y <= bgHeight; y += spacing) {
        let dx = bgMouse.x - x;
        let dy = bgMouse.y - y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        let radius = 1;
        let blend = 0;

        if (distance < effectRadius) {
          let force = 1 - (distance / effectRadius);
          radius = 1 + (5 * force);
          blend = force;
        }

        if (blend > 0.1) {
          let offset = 2 * blend;
          let alpha = blend * 0.8;
          bgCtx.beginPath(); bgCtx.arc(x - 2 * offset, y - 2 * offset, radius * 0.8, 0, Math.PI * 2); bgCtx.fillStyle = `rgba(0, 255, 255, ${alpha})`; bgCtx.fill();
          bgCtx.beginPath(); bgCtx.arc(x + 2 * offset, y - 2 * offset, radius * 0.8, 0, Math.PI * 2); bgCtx.fillStyle = `rgba(255, 0, 255, ${alpha})`; bgCtx.fill();
          bgCtx.beginPath(); bgCtx.arc(x,y + 2 * offset, radius * 0.8, 0, Math.PI * 2); bgCtx.fillStyle = `rgba(255, 230, 0, ${alpha})`; bgCtx.fill();
          bgCtx.beginPath(); bgCtx.arc(x, y, radius, 0, Math.PI * 2); bgCtx.fillStyle = `rgba(5, 5, 5, ${1 - (blend * 0.99)})`; bgCtx.fill();
        } else {
          bgCtx.beginPath(); bgCtx.arc(x, y, radius, 0, Math.PI * 2); bgCtx.fillStyle = '#050505'; bgCtx.fill();
        }
      }
    }
    requestAnimationFrame(animateBg);
  }
  animateBg();

  // ==========================================
  // SCROLL INFINITO DA GRELHA PRINCIPAL
  // ==========================================
  const mainScrollArea = document.getElementById('main-scroll-area');
  const mainGrid = document.getElementById('main-grid');

  // Guardamos o conteúdo inicial dos 9 projetos para ir clonando
  const originalGridContent = mainGrid.innerHTML;

  mainScrollArea.addEventListener('scroll', () => {
    // Se o scroll chegar perto do fundo (margem de 300px)
    if (mainScrollArea.scrollTop + mainScrollArea.clientHeight >= mainScrollArea.scrollHeight - 300) {
      // Injeta os mesmos 9 projetos no fim da grelha, criando o loop infinito
      mainGrid.insertAdjacentHTML('beforeend', originalGridContent);
    }
  }, { passive: true });


  // ==========================================
  // LÓGICA DO POP-UP E SCROLL INFINITO (MODAL)
  // ==========================================
  const modal = document.getElementById('projeto-modal');
  const modalTitle = document.getElementById('modal-title');
  const modalDesc = document.getElementById('modal-desc');
  const modalImages = document.getElementById('modal-images');
  const modalScrollArea = document.getElementById('modal-scroll-area');

  // 1. Criamos a variável que vai controlar se há vídeo
  let projetoTemVideo = false;

  function abrirProjeto(elemento) {
    const titulo = elemento.getAttribute('data-title');
    const desc = elemento.getAttribute('data-desc');
    const imagensStrings = elemento.getAttribute('data-imgs');
    const imagensArray = imagensStrings.split(',');

    modalTitle.innerHTML = `<span class="marcador">${titulo}</span>`;
    modalDesc.innerHTML = `<span class="marcador">${desc}</span>`;
    modalImages.innerHTML = '';

    // Reset da variável sempre que abres um projeto novo
    projetoTemVideo = false;

    imagensArray.forEach(url => {
      const urlLimpo = url.trim();

      if (urlLimpo.toLowerCase().endsWith('.mp4') || urlLimpo.toLowerCase().endsWith('.webm')) {
        // Encontrou um vídeo! Ativa o nosso interruptor
        projetoTemVideo = true;

        const video = document.createElement('video');
        video.src = urlLimpo;
        video.setAttribute('controls', '');
        video.setAttribute('autoplay', '');
        video.setAttribute('loop', '');
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        modalImages.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = urlLimpo;
        modalImages.appendChild(img);
      }
    });

    modalScrollArea.scrollTop = 0;
    modal.classList.add('active');
  }

  function fecharProjeto() {
    modal.classList.remove('active');

    // Pausa os vídeos quando fechas a modal, para o som não continuar a dar ao fundo
    const videos = modalImages.querySelectorAll('video');
    videos.forEach(vid => vid.pause());
  }

  // 2. O Scroll Infinito agora respeita o interruptor
  modalScrollArea.addEventListener('scroll', () => {
    // SE houver um vídeo neste projeto, a função "return" cancela o scroll infinito!
    if (projetoTemVideo) return;

    if (modalScrollArea.scrollTop + modalScrollArea.clientHeight >= modalScrollArea.scrollHeight - 100) {
      const conteudoAtual = modalImages.innerHTML;
      modalImages.innerHTML += conteudoAtual;
    }
  }, { passive: true });
</script>
</body>
</html>
